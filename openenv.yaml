spec_version: 1

name: email-triage-env
version: "1.0.0"
description: >
  AI Email Triage and Response System — an OpenEnv environment that simulates
  a customer-support email inbox. Agents must classify, prioritize, decide on
  actions, and optionally draft responses for incoming emails.

type: space
runtime: fastapi
app: app:app
port: 7860

tasks:
  - id: easy
    name: "Clear Classification & Priority"
    description: >
      Straightforward emails with unambiguous intent. Agent must correctly
      classify the category and assign priority. Deterministic grading.
    data_path: data/easy_emails.json
    grader: graders.rule_based:RuleBasedGrader

  - id: medium
    name: "Ambiguous Emails with Action Selection"
    description: >
      Emails with ambiguous intent or missing information. Agent must
      classify, prioritize, AND choose an action (respond / escalate /
      request_info). Mixed rule-based grading.
    data_path: data/medium_emails.json
    grader: graders.rule_based:RuleBasedGrader

  - id: hard
    name: "Full Pipeline with Response Generation"
    description: >
      Complete pipeline — classify, prioritize, choose action, and draft
      a response. Graded with a combination of rule-based and LLM-based
      scoring for response quality.
    data_path: data/hard_emails.json
    grader: graders.llm_grader:LLMGrader
